<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Projetos Python - BSI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      text-align: center;
    }

    header {
      background: #161b22;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      margin-top: 40px;
    }

    .card {
      background: #161b22;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px #000;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #238636;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2ea043;
    }
  </style>
</head>

<body>

<header>
  🚀 Meus Testes em Python
</header>

<div class="container">

  <div class="card">
    <h3>Calculadora</h3>
    <p>Projeto simples em Python</p>
    <button onclick="alert('Rodar via Python backend')">
      Executar
    </button>
  </div>

  <div class="card">
    <h3>Conversor</h3>
    <p>Decimal para Octal</p>
    <button onclick="alert('Rodar via Python backend')">
      Executar
    </button>
  </div>

  <div class="card">
    <h3>Loop Infinito</h3>
    <p>Teste com print</p>
    <button onclick="alert('Rodar via Python backend')">
      Executar
    </button>
  </div>

</div>

</body>
</html>
